name = "Erdos"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Erdos"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

# Pinned to the merge commit of PR #4255 (adds ErdosProblems/619).
# Provides the canonical `Erdos619.minNewEdges` and `Erdos619.erdos_619`
# statement that `Solution.lean` proves the negation of.
[[require]]
name = "formal_conjectures"
git = "https://github.com/google-deepmind/formal-conjectures"
rev = "1a9fbee"

[[lean_lib]]
name = "Erdos"

[[lean_lib]]
name = "Challenge"

[[lean_lib]]
name = "Solution"
